<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e6e1e2, #a8b0bd);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #fff;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(66, 20, 20, 0.2);
      width: 300px;
      text-align: center;
    }
    .login-container h2 {
      margin-bottom: 20px;
      color: #333;
    }
    .login-container input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .login-container button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background: #2575fc;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .login-container button:hover {
      background: #1a5ed8;
    }
    .login-container p {
      margin-top: 15px;
      font-size: 14px;
    }
    .login-container a {
      color: #2575fc;
      text-decoration: none;
    }
    .login-container a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Submit</button>
      <p class="error" id="errorMsg"></p>
    </form>
    <p>Don't have an account? <a href="#">Register</a></p>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

   
      // Demo credentials (you can replace with DB validation later)
      const demoUser = "admin";
      const demoPass = "12345";

      if (username === "" || password === "") {
        errorMsg.textContent = "⚠ Please fill in all fields.";
      } else if (username === demoUser && password === demoPass) {
        errorMsg.style.color = "green";
        errorMsg.textContent = "✅ Login successful!";
        // redirect after login
        setTimeout(() => {
          window.location.href = "Mainpage.html"; // your next page
        }, 1000);
      } else {
        errorMsg.style.color = "red";
        errorMsg.textContent = "❌ Invalid username or password.";
      }
    });
  </script>
</body>
</html>
