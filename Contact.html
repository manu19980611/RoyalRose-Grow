<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - MyStore</title>
  <style>
    /* Contact Page */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: pink;
}
.contact-section {
  padding: 40px;
  text-align: center;
}
.contact-container {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
  flex-wrap: wrap;
}
.contact-form, .contact-info {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  width: 400px;
  margin: 10px;
  text-align: left;
}
.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 10px;
  margin: 8px -8px 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
}
.contact-form button {
  background: #2575fc;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
.contact-form button:hover {
  background: #1a5ed8;
}
.contact-info h3 {
  color: #2575fc;
  margin-bottom: 10px;
}

    </style>
</head>
<body>

  <!-- Contact Section -->
  <section class="contact-section">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you! Please fill out the form below or reach us via details.</p>
    
    <div class="contact-container">
      
      <!-- Contact Form -->
      <form class="contact-form" onsubmit="submitForm(event)">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
      </form>

      <!-- Contact Info -->
      <div class="contact-info">
        <h3>Our Office</h3>
        <p><strong>Address:</strong> 123, Main Street, City, India</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Email:</strong> support@mystore.com</p>
      </div>
    </div>
  </section>

  <script>
    function submitForm(event) {
      event.preventDefault();
      alert("✅ Thank you for contacting us! We will get back to you soon.");
      document.querySelector(".contact-form").reset();
    }
  </script>

</body>
</html>
